<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manojit Maitra - Portfolio Poster</title>
    
    <!-- Google Fonts: Bangers -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="poster-container" id="poster">
        
        <!-- Panel 1 (Top / Red) -->
        <div class="panel panel-1">
            <img src="images/hero1.png" alt="Varsity Jacket Intro" class="hero-img-1">
            <div class="bubble bubble-main delay-1">
                HI, I'M MANOJIT MAITRA.<br>
                FULL-STACK DEVELOPER BY DAY.<br>
                BUG HUNTER BY NIGHT.
                <div class="tail-left"></div>
            </div>
            
        </div>

        <!-- Panel 2 (Yellow) -->
        <div class="panel panel-2">
            <img src="images/hero2.png" alt="Thumbs up" class="hero-img-2">
            <div class="bubble bubble-large delay-2">
                OH YEAH... <br>
                THESE ARE MY PROFILES
                <div class="tail-right"></div>
            </div>
            <div class="bubble-group-right">
                <a href="#" class="bubble bubble-small delay-3">
                    <span class="icon">{"{ }"}</span> LEETCODE
                    <div class="tail-right"></div>
                </a>
                <a href="#" class="bubble bubble-small delay-4">
                    <span class="icon">💻</span> GITHUB
                    <div class="tail-right"></div>
                </a>
                <a href="#" class="bubble bubble-small delay-5">
                    <span class="icon">in</span> LINKEDIN
                    <div class="tail-right"></div>
                </a>
            </div>
        </div>

        <!-- Panel 3 (Row 3 Left) -->
        <div class="panel panel-3">
            <img src="images/panel3.jpeg" alt="Walking to engineering" class="panel-bg">
            <div class="caption-box delay-6">
                A FINE DAY, PROJECTS WORKING, NO BUGS
            </div>
        </div>

        <!-- Panel 4 (Row 3 Right) -->
        <div class="panel panel-4">
            <img src="images/panel4.jpeg" alt="Intense stare" class="panel-bg">
            <div class="caption-vertical delay-7">
                SUDDENLY
            </div>
        </div>

        <!-- Panel 5 (Row 4 Left) -->
        <div class="panel panel-5">
            <img src="images/panel5.jpg" alt="Putting on mask" class="panel-bg">
        </div>

        <!-- Panel 6 (Row 4 Right) -->
        <div class="panel panel-6">
            <img src="images/panel6.jpg" alt="Coding" class="panel-bg">
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
